<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}{% endblock %} | Project Archive</title>
        <script src="https://cdn.tailwindcss.com"></script> <!--css framework for styling shortcuts-->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
        <link rel="stylesheet" href="{% block style %}{% endblock %}">
    </head>
    <body class="p-6 md:p-10">
        <header class="header-nav max-w-6xl mx-auto">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-graduation-cap text-3xl logo-dark"></i>
                <h1 class="text-2xl font-bold">Project Archive</h1>
            </div>
            <nav class="flex gap-8 font-medium">
                <a href="{{ url_for('index') }}" class="nav-link">Home</a>
                <a href="#" class="nav-link">About</a>
                <a href="#" class="nav-link">FAQ</a>
                <a href="{{ url_for('auth.login') }}" class="nav-link">Login</a>
            </nav>
        </header>
        {% block content %}{% endblock %}
    </body>
</html>
